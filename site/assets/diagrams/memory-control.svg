<text x="530" y="171" font-size="11" fill="#5B6472" font-weight="400" text-anchor="middle" dominant-baseline="central">Nothing else carries over</text>
<line x1="530" y1="98" x2="530" y2="108" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="380" y="210" width="300" height="46" rx="8" fill="#EAF0FC" stroke="#2E5BC9" stroke-width="0.8"/>
<text x="530" y="226" font-size="12" fill="#1E3E8C" font-weight="600" text-anchor="middle" dominant-baseline="central">Exactly what you chose</text>
<text x="530" y="244" font-size="11" fill="#5B6472" font-weight="400" text-anchor="middle" dominant-baseline="central">Inspectable · same input, same output</text>
<line x1="530" y1="146" x2="530" y2="210" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="530" y1="256" x2="530" y2="286" stroke="#5B6472" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="380" y="288" width="300" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="530" y="306" font-size="12" fill="#0F6E56" font-weight="600" text-anchor="middle" dominant-baseline="central">Resume from chosen material</text>
<text x="530" y="326" font-size="11" fill="#0F6E56" font-weight="400" text-anchor="middle" dominant-baseline="central">Reproducible · no contamination</text>
<line x1="360" y1="50" x2="360" y2="345" stroke="#D2D9E6" stroke-width="1" stroke-dasharray="4 4"/>
<text x="360" y="372" font-size="12" fill="#5B6472" font-weight="400" text-anchor="middle" dominant-baseline="central">The risk isn't memory itself — it's context you can't see, inspect, or control</text>
</svg>