<svg viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg" role="img" style="font-family:Calibri, 'Segoe UI', sans-serif;background:#FFFFFF;max-width:100%;height:auto">
<title>MemoryControl</title>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5B6472" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text x="190" y="36" font-size="12" fill="#1A1A2E" font-weight="600" text-anchor="middle" dominant-baseline="central">Subscribed LLM + memory (on by default)</text>
