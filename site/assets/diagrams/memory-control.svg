<text x="110" y="127" font-size="11" fill="#A32D2D" font-weight="400" text-anchor="middle" dominant-baseline="central">Discarded drafts</text>
<rect x="200" y="108" width="140" height="38" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8"/>
<text x="270" y="127" font-size="11" fill="#A32D2D" font-weight="400" text-anchor="middle" dominant-baseline="central">Roles you skipped</text>
<rect x="40" y="152" width="140" height="38" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8"/>
<text x="110" y="171" font-size="11" fill="#A32D2D" font-weight="400" text-anchor="middle" dominant-baseline="central">A salary aside</text>
<rect x="200" y="152" width="140" height="38" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8"/>
<text x="270" y="171" font-size="11" fill="#A32D2D" font-weight="400" text-anchor="middle" dominant-baseline="central">A different pitch</text>
<line x1="190" y1="98" x2="190" y2="108" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="110" y1="146" x2="110" y2="152" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="270" y1="146" x2="270" y2="152" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="40" y="210" width="300" height="46" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="190" y="226" font-size="12" fill="#1A1A2E" font-weight="600" text-anchor="middle" dominant-baseline="central">Opaque blended profile</text>
<text x="190" y="244" font-size="11" fill="#5B6472" font-weight="400" text-anchor="middle" dominant-baseline="central">You can't see or edit what it kept</text>
<line x1="190" y1="190" x2="190" y2="210" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="110" y1="190" x2="180" y2="210" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="270" y1="190" x2="200" y2="210" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="190" y1="256" x2="190" y2="286" stroke="#5B6472" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="40" y="288" width="300" height="52" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8"/>
<text x="190" y="306" font-size="12" fill="#A32D2D" font-weight="600" text-anchor="middle" dominant-baseline="central">Resume with leaked context</text>
<text x="190" y="326" font-size="11" fill="#A32D2D" font-weight="400" text-anchor="middle" dominant-baseline="central">Different each run · not reproducible</text>
<text x="530" y="36" font-size="12" fill="#1A1A2E" font-weight="600" text-anchor="middle" dominant-baseline="central">Maestro — explicit, inspectable context</text>
<rect x="380" y="58" width="300" height="40" rx="8" fill="#EAF0FC" stroke="#2E5BC9" stroke-width="0.8"/>
<text x="530" y="78" font-size="12" fill="#1E3E8C" font-weight="400" text-anchor="middle" dominant-baseline="central">Master profile (you curate)</text>
