site_name: Maestro AI
site_description: An open-source, AI-powered job-search automation system.
site_url: https://parseus-ai-inc.github.io/maestro-ai-backend/
repo_url: https://github.com/parseus-ai-inc/maestro-ai-backend
repo_name: parseus-ai-inc/maestro-ai-backend
copyright: Copyright &copy; 2026 Parseus AI

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant      # fast SPA-like page loads
    - navigation.tracking     # url updates with the section
    - navigation.sections     # group headers in the sidebar
    - navigation.top          # back-to-top button
    - navigation.footer       # prev/next links at page bottom
    - search.suggest
    - search.highlight
    - content.code.copy       # copy button on code blocks
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/parseus.css

markdown_extensions:
  - admonition                # the >💡 callout boxes
  - pymdownx.details
  - pymdownx.superfences      # better code blocks + diagrams
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started:
      - Overview: 01-overview.md
      - Installation: 02-installation.md
      - Configuration: 03-configuration.md
      - Running the system: 04-running.md
  - Reference:
      - Architecture: 05-architecture.md
      - Database reference: 06-database-reference.md
      - Importing workflows: 11-importing-workflows.md
      - Troubleshooting: 07-troubleshooting.md
      - FAQ & glossary: 08-faq-glossary.md
  - Customizing:
      - Prompting & customizing: 09-prompting.md
      - Master career dossier: 10-master-dossier.md
