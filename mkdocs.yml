site_name: Maestro AI
site_description: An open-source, AI-powered job-search automation system.
site_url: https://parseus-ai-inc.github.io/maestro-ai-backend/
repo_url: https://github.com/parseus-ai-inc/maestro-ai-backend
repo_name: parseus-ai-inc/maestro-ai-backend
copyright: Copyright &copy; 2026 Parseus AI

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
    - toc.integrate
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/parseus.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - footnotes
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Why Maestro?: why-maestro.md
  - Getting started:
      - Overview: 01-overview.md
      - Installation: 02-installation.md
      - Configuration: 03-configuration.md
      - Running the system: 04-running.md
  - Reference:
      - Architecture: 05-architecture.md
      - Database reference: 06-database-reference.md
      - Importing workflows: 11-importing-workflows.md
      - Troubleshooting: 07-troubleshooting.md
      - FAQ & glossary: 08-faq-glossary.md
  - Customizing:
      - Prompting & customizing: 09-prompting.md
      - Master career dossier: 10-master-dossier.md
