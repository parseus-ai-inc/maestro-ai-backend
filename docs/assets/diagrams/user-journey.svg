<svg viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg" role="img" style="font-family:Calibri, 'Segoe UI', sans-serif;background:#FFFFFF;max-width:100%;height:auto">
<title>UserJourney</title>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5B6472" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="40" y="40" width="600" height="36" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="340" y="58" font-size="12" fill="#1A1A2E" font-weight="600" text-anchor="middle" dominant-baseline="central">You set your goals</text>
<text x="340" y="69" font-size="12" fill="#5F5E5A" font-weight="400" text-anchor="middle" dominant-baseline="central">Roles, preferences, master profile</text>
<line x1="340" y1="76" x2="340" y2="108" stroke="#5B6472" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="40" y="110" width="290" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="185" y="128" font-size="12" fill="#0F6E56" font-weight="600" text-anchor="middle" dominant-baseline="central">Auto-discovers jobs</text>
<text x="185" y="148" font-size="12" fill="#0F6E56" font-weight="400" text-anchor="middle" dominant-baseline="central">Scans boards, scores fit for you</text>
<rect x="350" y="110" width="290" height="56" rx="8" fill="#FAEEDA" stroke="#A16207" stroke-width="0.8"/>
<text x="495" y="128" font-size="12" fill="#A16207" font-weight="600" text-anchor="middle" dominant-baseline="central">You paste a job too</text>
<text x="495" y="148" font-size="12" fill="#A16207" font-weight="400" text-anchor="middle" dominant-baseline="central">Any URL or description, your pick</text>
<line x1="185" y1="166" x2="320" y2="206" stroke="#5B6472" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="495" y1="166" x2="360" y2="206" stroke="#5B6472" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="190" y="208" width="300" height="56" rx="8" fill="#EAF0FC" stroke="#2E5BC9" stroke-width="0.8"/>
<text x="340" y="226" font-size="12" fill="#1E3E8C" font-weight="600" text-anchor="middle" dominant-baseline="central">You review &amp; decide</text>
<text x="340" y="246" font-size="12" fill="#2E5BC9" font-weight="400" text-anchor="middle" dominant-baseline="central">Build, dismiss, or skip — your call</text>
<line x1="340" y1="264" x2="340" y2="296" stroke="#5B6472" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="40" y="298" width="290" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="185" y="316" font-size="12" fill="#0F6E56" font-weight="600" text-anchor="middle" dominant-baseline="central">Auto-builds your application</text>
<text x="185" y="336" font-size="12" fill="#0F6E56" font-weight="400" text-anchor="middle" dominant-baseline="central">Tailored resume + cover letter</text>
<rect x="350" y="298" width="290" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="495" y="316" font-size="12" fill="#0F6E56" font-weight="600" text-anchor="middle" dominant-baseline="central">Self-checks the quality</text>
<text x="495" y="336" font-size="12" fill="#0F6E56" font-weight="400" text-anchor="middle" dominant-baseline="central">Critiques, verifies, scores fit</text>
<line x1="185" y1="354" x2="320" y2="394" stroke="#5B6472" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="495" y1="354" x2="360" y2="394" stroke="#5B6472" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="190" y="396" width="300" height="56" rx="8" fill="#EAF0FC" stroke="#2E5BC9" stroke-width="0.8"/>
<text x="340" y="414" font-size="12" fill="#1E3E8C" font-weight="600" text-anchor="middle" dominant-baseline="central">You refine to taste</text>
<text x="340" y="434" font-size="12" fill="#2E5BC9" font-weight="400" text-anchor="middle" dominant-baseline="central">Polish, re-run, or edit yourself</text>
<line x1="340" y1="452" x2="340" y2="484" stroke="#5B6472" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="40" y="486" width="600" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="340" y="504" font-size="12" fill="#1A1A2E" font-weight="600" text-anchor="middle" dominant-baseline="central">You track every application</text>
<text x="340" y="524" font-size="12" fill="#5F5E5A" font-weight="400" text-anchor="middle" dominant-baseline="central">Status, costs, analytics — all in one dashboard</text>
<text x="340" y="572" font-size="12" fill="#5B6472" font-weight="400" text-anchor="middle" dominant-baseline="central">Blue = you decide · Teal = automation works · Amber = your input</text>
</svg>