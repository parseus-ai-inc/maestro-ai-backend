<svg viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg" role="img" style="font-family:Calibri, 'Segoe UI', sans-serif;background:#FFFFFF;max-width:100%;height:auto">
<title>DualControl</title>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5B6472" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="40" y="50" width="270" height="92" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="175" y="74" font-size="12" fill="#0F6E56" font-weight="600" text-anchor="middle" dominant-baseline="central">Which model runs it</text>
<text x="175" y="98" font-size="12" fill="#0F6E56" font-weight="400" text-anchor="middle" dominant-baseline="central">Provider + tier, per agent</text>
<text x="175" y="116" font-size="12" fill="#0F6E56" font-weight="400" text-anchor="middle" dominant-baseline="central">Cheap for scoring, premium for refine</text>
<rect x="370" y="50" width="270" height="92" rx="8" fill="#FAEEDA" stroke="#A16207" stroke-width="0.8"/>
<text x="505" y="74" font-size="12" fill="#A16207" font-weight="600" text-anchor="middle" dominant-baseline="central">How it behaves</text>
<text x="505" y="98" font-size="12" fill="#A16207" font-weight="400" text-anchor="middle" dominant-baseline="central">Editable prompt, per agent</text>
<text x="505" y="116" font-size="12" fill="#A16207" font-weight="400" text-anchor="middle" dominant-baseline="central">Tune to your background &amp; voice</text>
<line x1="175" y1="142" x2="310" y2="196" stroke="#5B6472" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="505" y1="142" x2="370" y2="196" stroke="#5B6472" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="220" y="198" width="240" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text x="340" y="216" font-size="12" fill="#993C1D" font-weight="600" text-anchor="middle" dominant-baseline="central">Each agent</text>
<text x="340" y="236" font-size="12" fill="#993C1D" font-weight="400" text-anchor="middle" dominant-baseline="central">Configured the way you want it</text>
<line x1="340" y1="254" x2="340" y2="286" stroke="#5B6472" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="200" y="288" width="280" height="56" rx="8" fill="#EEEDFE" stroke="#3C3489" stroke-width="0.8"/>
<text x="340" y="306" font-size="12" fill="#3C3489" font-weight="600" text-anchor="middle" dominant-baseline="central">Drafts, verifies, critiques, scores</text>
<text x="340" y="326" font-size="12" fill="#3C3489" font-weight="400" text-anchor="middle" dominant-baseline="central">Builds the case — does not decide</text>
<line x1="340" y1="344" x2="340" y2="376" stroke="#5B6472" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="180" y="378" width="320" height="44" rx="8" fill="#EAF0FC" stroke="#2E5BC9" stroke-width="0.8"/>
<text x="340" y="400" font-size="12" fill="#1E3E8C" font-weight="600" text-anchor="middle" dominant-baseline="central">You make the final call to apply</text>
</svg>