<svg viewBox="0 0 720 565" xmlns="http://www.w3.org/2000/svg" role="img" style="font-family:Calibri, 'Segoe UI', sans-serif;background:#FFFFFF;max-width:100%;height:auto">
<title>PlatformArchitecture</title>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5B6472" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text x="360" y="34" font-size="15" fill="#1A1A2E" font-weight="600" text-anchor="middle" dominant-baseline="central">The pattern, with the domain swapped out</text>
<rect x="40" y="60" width="300" height="40" rx="8" fill="#EAF0FC" stroke="#2E5BC9" stroke-width="0.8"/>
<text x="190" y="80" font-size="12" fill="#1E3E8C" font-weight="600" text-anchor="middle" dominant-baseline="central">Curated source of truth</text>
<rect x="380" y="60" width="300" height="40" rx="8" fill="#EAF0FC" stroke="#2E5BC9" stroke-width="0.8"/>
<text x="530" y="80" font-size="12" fill="#1E3E8C" font-weight="600" text-anchor="middle" dominant-baseline="central">This task's inputs</text>
<text x="360" y="118" font-size="11" fill="#5B6472" font-weight="400" text-anchor="middle" dominant-baseline="central">Explicit context assembly — nothing else carries over</text>
<line x1="190" y1="100" x2="340" y2="150" stroke="#5B6472" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="530" y1="100" x2="380" y2="150" stroke="#5B6472" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="220" y="152" width="280" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="360" y="172" font-size="12" fill="#1A1A2E" font-weight="600" text-anchor="middle" dominant-baseline="central">Orchestrator · fans out per item</text>
<line x1="300" y1="192" x2="180" y2="230" stroke="#5B6472" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="360" y1="192" x2="360" y2="230" stroke="#5B6472" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="420" y1="192" x2="540" y2="230" stroke="#5B6472" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="40" y="232" width="200" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text x="140" y="250" font-size="12" fill="#993C1D" font-weight="600" text-anchor="middle" dominant-baseline="central">Generator</text>
<text x="140" y="270" font-size="11" fill="#993C1D" font-weight="400" text-anchor="middle" dominant-baseline="central">Drafts the artifact</text>
<rect x="260" y="232" width="200" height="52" rx="8" fill="#EEEDFE" stroke="#3C3489" stroke-width="0.8"/>
<text x="360" y="250" font-size="12" fill="#3C3489" font-weight="600" text-anchor="middle" dominant-baseline="central">Verifier</text>
<text x="360" y="270" font-size="11" fill="#3C3489" font-weight="400" text-anchor="middle" dominant-baseline="central">Checks vs source of truth</text>
<rect x="480" y="232" width="200" height="52" rx="8" fill="#EEEDFE" stroke="#3C3489" stroke-width="0.8"/>
<text x="580" y="250" font-size="12" fill="#3C3489" font-weight="600" text-anchor="middle" dominant-baseline="central">Critic</text>
<text x="580" y="270" font-size="11" fill="#3C3489" font-weight="400" text-anchor="middle" dominant-baseline="central">Flags weaknesses</text>
<line x1="140" y1="284" x2="320" y2="322" stroke="#5B6472" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="360" y1="284" x2="360" y2="322" stroke="#5B6472" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="580" y1="284" x2="400" y2="322" stroke="#5B6472" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="240" y="324" width="240" height="40" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text x="360" y="344" font-size="12" fill="#993C1D" font-weight="600" text-anchor="middle" dominant-baseline="central">Scorer · rates before release</text>
<rect x="40" y="324" width="170" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="125" y="342" font-size="11" fill="#0F6E56" font-weight="600" text-anchor="middle" dominant-baseline="central">Per-agent model</text>
<text x="125" y="360" font-size="11" fill="#0F6E56" font-weight="400" text-anchor="middle" dominant-baseline="central">cheap → premium</text>
<rect x="510" y="324" width="170" height="52" rx="8" fill="#FAEEDA" stroke="#A16207" stroke-width="0.8"/>
<text x="595" y="342" font-size="11" fill="#A16207" font-weight="600" text-anchor="middle" dominant-baseline="central">Full observability</text>
<text x="595" y="360" font-size="11" fill="#A16207" font-weight="400" text-anchor="middle" dominant-baseline="central">cost · tokens · runs</text>
<line x1="360" y1="364" x2="360" y2="394" stroke="#5B6472" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="220" y="396" width="280" height="44" rx="8" fill="#EAF0FC" stroke="#2E5BC9" stroke-width="0.8"/>
<text x="360" y="418" font-size="13" fill="#1E3E8C" font-weight="600" text-anchor="middle" dominant-baseline="central">Human decision gate</text>
<line x1="360" y1="440" x2="360" y2="470" stroke="#5B6472" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="220" y="472" width="280" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="360" y="492" font-size="12" fill="#1A1A2E" font-weight="600" text-anchor="middle" dominant-baseline="central">Recorded, traceable output</text>
<text x="360" y="540" font-size="12" fill="#5B6472" font-weight="400" text-anchor="middle" dominant-baseline="central">Swap the source of truth + the artifact = a new application. The pattern is constant.</text>
</svg>